# This rule is not used by the project proxy itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the minecraft.miminecraftserver.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: proxy
    app.kubernetes.io/managed-by: kustomize
  name: minecraftproxy-editor-role
rules:
- apiGroups:
  - minecraft.miminecraftserver.com
  resources:
  - minecraftproxies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - minecraft.miminecraftserver.com
  resources:
  - minecraftproxies/status
  verbs:
  - get
